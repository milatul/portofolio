<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Portofolio proyek-proyek terbaik saya">
    <title>Portofolio - Galeri Proyek</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Navigation -->
    <header>
        <nav class="navbar">
            <div class="nav-container">
                <div class="logo">
                    <i class="fas fa-code"></i>
                    <span>Portofolio</span>
                </div>
                <ul class="nav-menu">
                    <li><a href="index.html" class="nav-link">Home</a></li>
                    <li><a href="about.html" class="nav-link">Tentang Saya</a></li>
                    <li><a href="portofolio.html" class="nav-link active">Portofolio</a></li>
                    <li><a href="contact.html" class="nav-link">Kontak</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main>
        <!-- Portofolio Header -->
        <section class="portofolio-header">
            <div class="portofolio-header-container">
                <h1 class="page-title">Portofolio Saya</h1>
                <p class="page-subtitle">Kumpulan proyek terbaik yang telah saya kerjakan dengan berbagai teknologi</p>
            </div>
        </section>

        <!-- Portofolio Section -->
        <section class="portofolio-section">
            <div class="portofolio-container">
                <!-- Filter Buttons -->
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">
                        <span>Semua</span>
                    </button>
                    <button class="filter-btn" data-filter="web">
                        <span>Web</span>
                    </button>
                    <button class="filter-btn" data-filter="mobile">
                        <span>Mobile</span>
                    </button>
                    <button class="filter-btn" data-filter="Game">
                        <span>Game</span>
                    </button>
                </div>

                <!-- Portofolio Grid -->
                <div class="portofolio-grid" id="portofolioGrid">
                    <!-- Portofolio items akan di-generate oleh JavaScript -->
                </div>
            </div>
        </section>

        <!-- CTA Section -->
        <section class="cta">
            <div class="cta-container">
                <h2>Tertarik Dengan Pekerjaan Saya?</h2>
                <p>Mari diskusikan ide proyek Anda dan mari kita wujudkan bersama-sama.</p>
                <a href="contact.html" class="btn btn-primary">
                    Mulai Proyek <i class="fas fa-arrow-right"></i>
                </a>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer>
        <div class="footer-container">
            <p>&copy; 2026 Portofolio Saya</p>
            <div class="social-links">
                <a href="https://github.com" target="_blank" title="GitHub">
                    <i class="fab fa-github"></i>
                </a>
                <a href="https://linkedin.com" target="_blank" title="LinkedIn">
                    <i class="fab fa-linkedin"></i>
                </a>
                <a href="https://instagram.com" target="_blank" title="Instagram">
                    <i class="fab fa-instagram"></i>
                </a>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
